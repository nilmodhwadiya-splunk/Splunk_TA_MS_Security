EVAL-parent_process_name = if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.InitiatingProcessFileName') AND NOT IN('properties.InitiatingProcessFileName', "", "null"), 'properties.InitiatingProcessFileName', \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessParentFileName') AND NOT IN('properties.InitiatingProcessParentFileName', "", "null"), 'properties.InitiatingProcessParentFileName', null()))
EVAL-parent_process_path = if('category' IN ("AdvancedHunting-DeviceProcessEvents", "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessFolderPath') AND NOT IN('properties.InitiatingProcessFolderPath', "", "null"), \
