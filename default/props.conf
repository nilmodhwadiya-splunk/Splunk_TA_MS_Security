[source::...ta-ms-defender*.log*]
sourcetype = ta:ms:defender:log

[source::...splunk_ta_ms_security*.log*]
sourcetype = ta:ms:defender:log

[ms:defender:atp:alerts]
EVAL-app = "ms:defender"
EVAL-type = "alert"
FIELDALIAS-body_from_description = description AS body
FIELDALIAS-subject_from_title = title AS subject
SHOULD_LINEMERGE = 0
TRUNCATE = 0
pulldown_type = 1
TIME_PREFIX = \"(?:lastUpdateTime|lastUpdateDateTime)"\:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 30
KV_MODE = json

############# UPDATED EXTRACTIONS ##############
EVAL-severity = lower(severity)

FIELDALIAS-mitre_technique_id_from_mitreTechniques = mitreTechniques{} AS mitre_technique_id
FIELDALIAS-signature_from_title = title AS signature
FIELDALIAS-user_name_from_relatedUser = relatedUser.userName AS user_name

EVAL-dest = coalesce('evidence{}.deviceDnsName', aadTenantId)
# Microsoft 365 API has threatName and threatFamilyName, where Microsoft Graph API only has threatFamilyName
EVAL-signature_id = case(isnotnull(threatName) AND threatName!="null", threatName, isnotnull(threatFamilyName) AND threatFamilyName!="null", threatFamilyName, true(), null())
EVAL-src = coalesce(serviceSource, computerDnsName)
EVAL-user = coalesce(mvfilter(isnotnull(actorDisplayName) AND actorDisplayName!="null"), mvfilter(isnotnull('evidence{}.userAccount.userPrincipalName') AND 'evidence{}.userAccount.userPrincipalName'!="null"), mvfilter(isnotnull('evidence{}.userPrincipalName') AND 'evidence{}.userPrincipalName'!="null"))

[ms365:defender:incident]
EVAL-app = "ms:defender"
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
TIME_PREFIX = \"(?:lastUpdateTime|lastUpdateDateTime)"\:\s*\"
TRUNCATE = 0
pulldown_type = 1

############# UPDATED EXTRACTIONS ##############
FIELDALIAS-comments_from_comment = comments{}.comment AS comments
FIELDALIAS-src_user_from_assignedTo = assignedTo AS src_user
FIELDALIAS-user_from_assignedTo = assignedTo AS user

EVAL-description = coalesce(displayName, incidentName)
EVAL-dest = coalesce(incidentWebUrl, incidentUri)
EVAL-ticket_id = coalesce(id, incidentId)
EVAL-time_submitted = coalesce(lastUpdateDateTime, createdTime)
EVAL-incident = coalesce(displayName, incidentName)

[source::...defender_advanced_hunting_modalert.log*]
sourcetype = tamsdefender:log

[source::...defender_update_incident_modalert.log*]
sourcetype = tamsdefender:log

[m365:defender:incident:advanced_hunting]
KV_MODE = json
TIME_PREFIX = Timestamp
# Common fields for all datasets
EVAL-action = case('$table'=="DeviceProcessEvents" OR '$table'=="DeviceImageLoadEvents" OR '$table'=="DeviceNetworkEvents","allowed", '$table'=="DeviceFileEvents" AND 'ActionType' == "FileCreated", "created", '$table'=="DeviceFileEvents" AND in('ActionType',"FileModified","FileRenamed"), "modified", '$table'=="DeviceFileEvents" AND 'ActionType' == "FileDeleted", "deleted", '$table'=="DeviceRegistryEvents" AND in('ActionType',"RegistryValueDeleted","RegistryKeyDeleted"), "deleted", '$table'=="DeviceRegistryEvents" AND in('ActionType',"RegistryValueSet","RegistryKeyCreated"), "created", '$table'=="EmailPostDeliveryEvents" AND 'Action' == "Soft delete", "deleted",'$table'=="EmailPostDeliveryEvents" AND 'Action' == "Added message info only", "delivered", '$table'=="EmailEvents",case('DeliveryAction'=="Delivered","delivered",'DeliveryAction'=="Blocked","blocked",'DeliveryAction'=="Junked","deleted",'DeliveryAction'=="Replaced","delivered"),'$table'=="IdentityLogonEvents",case('ActionType'=="LogonSuccess","success",'ActionType'=="LogonFailed","failure"),'$table'=="DeviceLogonEvents",case('ActionType'=="LogonAttempted","success"),'$table'=="DeviceEvents",case(like('ActionType',"%Blocked"),"blocked",true(),"allowed"),1==1, "unknown")
EVAL-dest = case('$table'=="EmailPostDeliveryEvents" OR '$table'=="EmailEvents",RecipientEmailAddress, DeviceName!="",DeviceName,DestinationIPAddress!="",DestinationIPAddress, IPAddress!="", IPAddress)
EVAL-src = case('$table'=="EmailPostDeliveryEvents" OR '$table'=="EmailEvents", coalesce(SenderIPv4,SenderIPv6),true(),RemoteIP)
EVAL-user = case('$table'=="DeviceProcessEvents" OR '$table'=="IdentityLogonEvents" OR '$table'=="DeviceLogonEvents" OR '$table'=="IdentityQueryEvents" OR '$table'=="DeviceEvents", 'AccountName', '$table'=="DeviceImageLoadEvents" OR '$table'=="DeviceNetworkEvents" OR '$table'=="DeviceFileEvents" OR '$table'=="DeviceRegistryEvents", 'InitiatingProcessAccountName','$table'=="EmailEvents" OR '$table'=="EmailPostDeliveryEvents",'SenderFromAddress')
EVAL-vendor_product = "Microsoft Defender for Endpoint"
# Email node
REPORT-recipient_domain_from_RecipientEmailAddress = recipient_domain_from_RecipientEmailAddress
EVAL-category = case('$table'=="EmailEvents",ThreatTypes)
EVAL-ids_type = case('$table'=="EmailEvents","network")
EVAL-orig_src = case(isnotnull('SenderIPv4') AND 'SenderIPv4' != "",'SenderIPv4',isnotnull('SenderIPv6') AND 'SenderIPv6' != "",'SenderIPv6', true(), null())
EVAL-recipient_count = mvcount(RecipientEmailAddress)
FIELDALIAS-internal_message_id_from_NetworkMessageId = NetworkMessageId AS internal_message_id
FIELDALIAS-message_id_from_InternetMessageId = InternetMessageId AS message_id
FIELDALIAS-orig_recipient_from_RecipientEmailAddress = RecipientEmailAddress AS orig_recipient
FIELDALIAS-recipient_from_RecipientEmailAddress = RecipientEmailAddress AS recipient
EVAL-return_addr = if(isnotnull('SenderFromAddress') AND 'SenderFromAddress' != "",'SenderFromAddress', null())
EVAL-src_user = if(isnotnull('SenderFromAddress') AND 'SenderFromAddress' != "",'SenderFromAddress', null())
EVAL-src_user_domain = if(isnotnull('SenderFromDomain') AND 'SenderFromDomain' != "",'SenderFromDomain', null())
EVAL-subject = if(isnotnull('Subject') AND 'Subject' != "", 'Subject', null())
# Authentication node
EVAL-app = "ms:defender"
EVAL-reason = case(ActionType=="LogonFailed",FailureReason)
EVAL-authentication_service = if(isnotnull('Application') AND 'Application' != "", 'Application', null())
EVAL-dest_nt_domain = if(isnotnull('AccountDomain') AND 'AccountDomain' != "", 'AccountDomain', null())
FIELDALIAS-signature_from_table = $table AS signature
EVAL-signature_id = if(isnotnull(ReportId_string) AND ReportId_string != "", ReportId_string, null())
# Ports node
EVAL-dest_ip = if(isnotnull('LocalIP') AND 'LocalIP' != "", 'LocalIP', null())
FIELDALIAS-ms_defender_advancedhunting_cim_endpoint_ports_dest_port = LocalPort as dest_port
FIELDALIAS-ms_defender_advancedhunting_cim_endpoint_ports_src_port = RemotePort as src_port
EVAL-creation_time = case('$table'=="DeviceNetworkEvents",'Timestamp')
EVAL-state = case('$table'=="DeviceNetworkEvents","listening")
EVAL-protocol = if(isnotnull('Protocol') AND 'Protocol' != "", lower('Protocol'), null())
# Filesystem node
EVAL-file_access_time = case('$table'=="DeviceFileEvents",'Timestamp')
EVAL-file_acl = case('$table'=="DeviceFileEvents",'InitiatingProcessTokenElevation')
EVAL-file_create_time = case('$table'=="DeviceFileEvents" AND 'ActionType' == "FileCreated",'Timestamp')
EVAL-file_hash = case('MD5' != "null", 'MD5', 'SHA1' != "null", 'SHA1', 'SHA256' != "null", 'SHA256', true(), null())
EVAL-file_modify_time = case('$table'=="DeviceFileEvents" AND in('ActionType',"FileModified","FileRenamed"),'Timestamp')
EVAL-file_name = case('$table'=="DeviceFileEvents",'FileName')
EVAL-file_path = case('$table'=="DeviceFileEvents",'FolderPath', true(), null())
EVAL-file_size = case('$table'=="DeviceFileEvents" AND 'FileSize' != "null",'FileSize')

# Registry node
EVAL-registry_value_type = case('$table'=="DeviceRegistryEvents", 'RegistryValueType', isnotnull(RegistryValueType) AND RegistryValueType != "", RegistryValueType, true(), null())
EVAL-registry_hive = case('$table'=="DeviceRegistryEvents", if(isnull('RegistryKey') OR 'RegistryKey'="", replace('PreviousRegistryKey',"(HKEY[_\w]+(\\\\(SAM|SECURITY|SOFTWARE|SYSTEM|\.DEFAULT))?).*","\1"), replace('RegistryKey',"(HKEY[_\w]+(\\\\(SAM|SECURITY|SOFTWARE|SYSTEM|\.DEFAULT))?).*","\1")))
EVAL-registry_key_name = case('$table'=="DeviceRegistryEvents", replace('RegistryKey',".+\\\\",""))
EVAL-registry_path = case('$table'=="DeviceRegistryEvents", if(isnull('RegistryKey') OR 'RegistryKey'="", 'PreviousRegistryKey', 'RegistryKey'))
EVAL-registry_value_name = case('$table'=="DeviceRegistryEvents", 'RegistryValueName')
EVAL-registry_value_data = case('$table'=="DeviceRegistryEvents", 'RegistryValueData')
EVAL-status = case('$table'=="DeviceRegistryEvents" AND (isnull('FailureReason') OR 'FailureReason'=="" OR 'FailureReason'=="null"),"success")
# Processes node
REPORT-0ms_security-process-parent_process_name_args = ms_security-process-parent_process_name_args
REPORT-0ms_security-process-parent_process_path_no_filename = ms_security-process-parent_process_path_no_filename
REPORT-0ms_security-process-process_name_args = ms_security-process-process_name_args
REPORT-0ms_security-process-process_path_no_filename = ms_security-process-process_path_no_filename

EVAL-cmdline = if(isnotnull('ProcessCommandLine') AND 'ProcessCommandLine' != "", 'ProcessCommandLine', null())
FIELDALIAS-ms_defender_advancedhunting_cim_endpoint_processes_parent_process_id = InitiatingProcessId AS parent_process_id
EVAL-parent_process_name = if(isnotnull('InitiatingProcessFileName') AND 'InitiatingProcessFileName' != "", 'InitiatingProcessFileName', null())
EVAL-parent_process_path = if(isnotnull('InitiatingProcessFolderPath') AND 'InitiatingProcessFolderPath' != "", 'InitiatingProcessFolderPath', null())
EVAL-process_id = if(isnotnull(ProcessId) AND ProcessId != "", ProcessId, null())
EVAL-process_integrity_level = if(isnotnull('ProcessIntegrityLevel') AND 'ProcessIntegrityLevel' != "", 'ProcessIntegrityLevel', null())
EVAL-process_name = if(isnotnull('FileName') AND 'FileName' != "", 'FileName', null())
EVAL-process_path = if(isnotnull('FolderPath') AND 'FolderPath' != "", 'FolderPath', null())
EVAL-user_id = if(isnotnull('AccountUpn') AND 'AccountUpn' != "", 'AccountUpn', null())
EVAL-os = if(isnotnull('OSPlatform') AND 'OSPlatform' != "", 'OSPlatform', null())
FIELDALIAS-process_current_directory_from_parent_process_path_no_filename = parent_process_path_no_filename AS process_current_directory
EVAL-process_hash = "MD5=" . 'MD5' . ",SHA1=" . 'SHA1' . ",SHA256=" . 'SHA256'
EVAL-parent_process_hash = "MD5=" . 'InitiatingProcessMD5' . ",SHA1=" . 'InitiatingProcessSHA1' . ",SHA256=" . 'InitiatingProcessSHA256'
EVAL-process_guid = case('AccountObjectId' == "null", null(), isnotnull('AccountObjectId'), "{" . upper('AccountObjectId') . "}")
EVAL-parent_process_guid = case('InitiatingProcessAccountObjectId' == "null", null(), isnotnull('InitiatingProcessAccountObjectId'), "{" . upper('InitiatingProcessAccountObjectId') . "}")
EVAL-process = coalesce(process_path_no_filename, "") .  "\\" . coalesce(trim(process_name_extracted, "\""), trim('FileName'), "") . case('FileName' == trim(process_args2, "\""), "", isnotnull(process_args2), " " . process_args2, isnotnull(process_args), " " . process_args, true(), "")
EVAL-parent_process = coalesce(parent_process_path_no_filename, "") .  "\\" . coalesce(trim(parent_process_name_extracted, "\""), parent_process_name, "") . case('InitiatingProcessFileName' == trim(parent_process_args2, "\""), "", isnotnull(parent_process_args2), " " . parent_process_args2, isnotnull(parent_process_args), " " . parent_process_args, 1==1, "")
# EVAL-parent_process = coalesce(parent_process_path_no_filename, "") .  "\\" . coalesce(trim(parent_process_name_extracted, "\""), "") . if(isnotnull(parent_process_args), " " . parent_process_args, "")
EVAL-parent_process_exec = if(replace('InitiatingProcessFolderPath',"(.*\\\)(?=.*(\.\w*)$|(\w+)$)","") != "", replace('InitiatingProcessFolderPath',"(.*\\\)(?=.*(\.\w*)$|(\w+)$)",""), null())
EVAL-process_exec = if(replace('FolderPath',"(.*\\\)(?=.*(\.\w*)$|(\w+)$)","") != "", replace('FolderPath',"(.*\\\)(?=.*(\.\w*)$|(\w+)$)",""), null())

[ms365:defender:incident:alerts]
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
TIME_PREFIX = \"(?:lastUpdatedTime|lastUpdateDateTime)"\:\s*\"

EVAL-app = "ms:defender"
EVAL-dest = coalesce('evidence{}.deviceDnsName', 'devices{}.deviceDnsName' ,'devices{}.mdatpDeviceId')
EVAL-severity = lower(severity)
EVAL-type = "alert"

FIELDALIAS-body_from_description = description AS body
FIELDALIAS-mitre_technique_id_from_mitreTechniques = mitreTechniques{} AS mitre_technique_id
FIELDALIAS-signature_from_title = title AS signature
FIELDALIAS-src_from_serviceSource = serviceSource AS src
FIELDALIAS-subject_from_title = title AS subject
FIELDALIAS-user_name_from_userPrincipalName = entities{}.accountName AS user_name

EVAL-signature_id = if(isnotnull(threatFamilyName) AND threatFamilyName!="null", threatFamilyName, null())
# Microsoft 365 API has alertId, whereas Microsoft Graph API has id
EVAL-id = coalesce(id, alertId)
EVAL-user = coalesce(mvfilter(isnotnull(actorDisplayName) AND actorDisplayName!="null"), mvfilter(isnotnull('evidence{}.userAccount.userPrincipalName') AND 'evidence{}.userAccount.userPrincipalName'!="null"), mvfilter(isnotnull('entities{}.userPrincipalName') AND 'entities{}.userPrincipalName'!="null"))

[ms:defender:simulations]
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
TIME_PREFIX = 'lastModifiedDateTime'

# Static values
EVAL-app = "ms:defender"
EVAL-dest = "Microsoft Defender Portal"
EVAL-severity = "informational"
EVAL-src = "Microsoft Defender for Endpoint"
EVAL-type = "alert"

EVAL-description = if(isnotnull('description') AND 'description'!="", description, null())
FIELDALIAS-signature_from_displayName = displayName AS signature
FIELDALIAS-signature_id_from_attackTechnique = attackTechnique AS signature_id
FIELDALIAS-user_from_lastModifiedBy = lastModifiedBy.email AS user
EVAL-user_name = if(isnotnull('lastModifiedBy.displayName') AND NOT IN('lastModifiedBy.displayName', "", "null"), 'lastModifiedBy.displayName', null())

[ms:defender:eventhub]
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
TIME_PREFIX = 'properties.Timestamp'

# Common fields
EVAL-action = if('category'=="AdvancedHunting-DeviceProcessEvents" AND 'properties.ActionType'=="ProcessCreated", "created", \
        if('category'=="AdvancedHunting-DeviceRegistryEvents" AND IN('properties.ActionType', "RegistryValueDeleted", "RegistryKeyDeleted"), "deleted", \
        if('category'=="AdvancedHunting-DeviceRegistryEvents" AND IN('properties.ActionType', "RegistryValueSet", "RegistryKeyCreated"), "created", \
        if('category'=="AdvancedHunting-DeviceFileEvents" AND 'properties.ActionType'=="FileCreated", "created", \
        if('category'=="AdvancedHunting-DeviceFileEvents" AND IN('properties.ActionType', "FileModified", "FileRenamed"), "modified", \
        if('category'=="AdvancedHunting-DeviceFileEvents" AND 'properties.ActionType'=="FileDeleted", "deleted", \
        if('category'=="AdvancedHunting-DeviceEvents" AND isnotnull('properties.ActionType'), "allowed", \
        if('category'=="AdvancedHunting-DeviceLogonEvents" AND 'properties.ActionType'=="LogonFailed", "blocked", \
        if('category'=="AdvancedHunting-DeviceLogonEvents" AND IN('properties.ActionType', "LogonSuccess", "LogonAttempted"), "allowed", \
        if('category'=="AdvancedHunting-DeviceNetworkEvents" AND 'properties.ActionType'=="ConnectionFailed", "blocked", \
        if('category'=="AdvancedHunting-DeviceNetworkEvents" AND IN('properties.ActionType', "ConnectionSuccess", "InboundConnectionAccepted", "ConnectionRequest", "InboundInternetScanInspected"), "allowed", \
        if('category'=="AdvancedHunting-DeviceImageLoadEvents" AND 'properties.ActionType'=="ImageLoaded", "read", null()))))))))))))
EVAL-dest = if('category'=="AdvancedHunting-DeviceEvents" AND isnotnull('properties.DeviceId') AND NOT IN('properties.DeviceId', "", "null"), 'properties.DeviceId', \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents") AND isnotnull('properties.RemoteIP') AND NOT IN('properties.RemoteIP', "", "null"), 'properties.RemoteIP', \
        if(isnotnull('tenantId') AND NOT IN('tenantId', "", "null"), tenantId, null())))
EVAL-src = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.DeviceId') AND NOT IN('properties.DeviceId', "", "null"), 'properties.DeviceId', null())
EVAL-vendor_product = if('category'=="AdvancedHunting-DeviceFileCertificateInfo", null(), \
        if(match('category', "AdvancedHunting-Device*"), "Microsoft Defender for Endpoint", null()))
EVAL-process_id = if(IN('category', "AdvancedHunting-DeviceRegistryEvents", "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents", "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessId') AND NOT IN('properties.InitiatingProcessId', "", "null"), 'properties.InitiatingProcessId', \
        if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.ProcessId') AND NOT IN('properties.ProcessId', "", "null"), 'properties.ProcessId', null()))
EVAL-user = if(IN('category', "AdvancedHunting-DeviceRegistryEvents", "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents", "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessAccountName') AND NOT IN('properties.InitiatingProcessAccountName', "", "null"), 'properties.InitiatingProcessAccountName', \
        if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.AccountName') AND NOT IN('properties.AccountName', "", "null"), 'properties.AccountName', null()))

# CertificateInfo model
EVAL-ssl_signature_algorithm = if('category'=="AdvancedHunting-DeviceFileCertificateInfo", "SHA1", null())
EVAL-ssl_subject_organization = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND 'properties.IsRootSignerMicrosoft'=="true", "Microsoft Corporation", null())
EVAL-ssl_end_time = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.CertificateExpirationTime') AND NOT IN('properties.CertificateExpirationTime', "", "null"), 'properties.CertificateExpirationTime', null())
EVAL-ssl_hash = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.SHA1') AND NOT IN('properties.SHA1', "", "null"), 'properties.SHA1', null())
EVAL-ssl_issuer_common_name = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.Issuer') AND NOT IN('properties.Issuer', "", "null"), 'properties.Issuer', null())
EVAL-ssl_serial = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.CertificateSerialNumber') AND NOT IN('properties.CertificateSerialNumber', "", "null"), 'properties.CertificateSerialNumber', null())
EVAL-ssl_start_time = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.CertificateCreationTime') AND NOT IN('properties.CertificateCreationTime', "", "null"), 'properties.CertificateCreationTime', null())
EVAL-ssl_subject_common_name = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.Signer') AND NOT IN('properties.Signer', "", "null"), 'properties.Signer', null())
EVAL-ssl_validity_window = if('category'=="AdvancedHunting-DeviceFileCertificateInfo" AND isnotnull('properties.CertificateCreationTime') AND 'properties.CertificateCreationTime'!="" AND isnotnull('properties.CertificateExpirationTime') AND  NOT IN('properties.CertificateExpirationTime', "", "null"), \
        round(strptime('properties.CertificateExpirationTime', "%Y-%m-%dT%H:%M:%SZ") - strptime('properties.CertificateCreationTime', "%Y-%m-%dT%H:%M:%SZ"), 0), null())

# Registry model
EVAL-registry_hive = if('category'=="AdvancedHunting-DeviceRegistryEvents", \
                if(isnotnull('properties.RegistryKey') AND NOT IN('properties.RegistryKey', "", "null"), \
                case('properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SAM%", "HKEY_LOCAL_MACHINE\\\\SAM", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SECURITY%", "HKEY_LOCAL_MACHINE\\\\Security", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SOFTWARE%", "HKEY_LOCAL_MACHINE\\\\Software", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SYSTEM%", "HKEY_LOCAL_MACHINE\\\\System", \
                'properties.RegistryKey' LIKE "HKEY_USERS\\\.DEFAULT%", "HKEY_USERS\\\\\.DEFAULT", \
                'properties.RegistryKey' LIKE "HKEY_CURRENT_CONFIG%", "HKEY_CURRENT_CONFIG", \
                'properties.RegistryKey' LIKE "HKEY_CURRENT_USER%", "HKEY_CURRENT_USER", \
                true(), null()), \
                if(isnotnull('properties.PreviousRegistryKey') AND NOT IN('properties.PreviousRegistryKey', "", "null"), \
                case('properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SAM%", "HKEY_LOCAL_MACHINE\\\\SAM", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SECURITY%", "HKEY_LOCAL_MACHINE\\\\Security", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SOFTWARE%", "HKEY_LOCAL_MACHINE\\\\Software", \
                'properties.RegistryKey' LIKE "HKEY_LOCAL_MACHINE\\SYSTEM%", "HKEY_LOCAL_MACHINE\\\\System", \
                'properties.RegistryKey' LIKE "HKEY_USERS\\\.DEFAULT%", "HKEY_USERS\\\\\.DEFAULT", \
                'properties.RegistryKey' LIKE "HKEY_CURRENT_CONFIG%", "HKEY_CURRENT_CONFIG", \
                'properties.RegistryKey' LIKE "HKEY_CURRENT_USER%", "HKEY_CURRENT_USER", \
                true(), null()), \
                null())), \
        null())
EVAL-registry_path = if('category'=="AdvancedHunting-DeviceRegistryEvents" AND isnotnull('properties.RegistryKey') AND NOT IN('properties.RegistryKey', "", "null"), replace('properties.RegistryKey', "\\\\", "\\\\\\\\"), \
        if('category'=="AdvancedHunting-DeviceRegistryEvents" AND isnotnull('properties.PreviousRegistryKey') AND NOT IN('properties.PreviousRegistryKey', "", "null"), replace('properties.PreviousRegistryKey', "\\\\", "\\\\\\\\"), null()))
EVAL-registry_key_name = if('category'=="AdvancedHunting-DeviceRegistryEvents" AND isnotnull('properties.RegistryKey') AND NOT IN('properties.RegistryKey', "", "null"), replace('properties.RegistryKey', ".+\\\\", ""), null())
EVAL-registry_value_data = if('category'=="AdvancedHunting-DeviceRegistryEvents" AND isnotnull('properties.RegistryValueData') AND NOT IN('properties.RegistryValueData', "", "null"), 'properties.RegistryValueData', null())
EVAL-registry_value_name = if('category'=="AdvancedHunting-DeviceRegistryEvents" AND isnotnull('properties.RegistryValueName') AND NOT IN('properties.RegistryValueName', "", "null"), 'properties.RegistryValueName', null())
EVAL-registry_value_type = if('category'!="AdvancedHunting-DeviceRegistryEvents" OR isnull('properties.RegistryValueType') OR IN('properties.RegistryValueType', "", "null"), null(), \
        if('properties.RegistryValueType'=="None", "REG_NONE", \
        if('properties.RegistryValueType'=="Binary", "REG_BINARY", \
        if('properties.RegistryValueType'=="Dword", "REG_DWORD", \
        if('properties.RegistryValueType'=="Qword", "REG_QWORD", \
        if('properties.RegistryValueType'=="String", "REG_SZ", \
        if('properties.RegistryValueType'=="MultiString", "REG_MULTI_SZ", null())))))))

# Filesystem model
EVAL-file_access_time = if(IN('category', "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents") ,'properties.Timestamp', null())
EVAL-file_acl = if(IN('category', "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents") AND isnotnull('properties.InitiatingProcessTokenElevation') AND NOT IN('properties.InitiatingProcessTokenElevation', "", "null"), \
        'properties.InitiatingProcessTokenElevation', null())
EVAL-file_create_time = if('category'=="AdvancedHunting-DeviceFileEvents" AND 'properties.ActionType'=="FileCreated",'properties.Timestamp', null())
EVAL-file_hash = if(NOT IN('category', "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents"), null(), \
        if(isnotnull('properties.MD5') AND NOT IN('properties.MD5', "", "null"), 'properties.MD5', \
        if(isnotnull('properties.SHA1') AND NOT IN('properties.SHA1', "", "null"), 'properties.SHA1', \
        if(isnotnull('properties.SHA256') AND NOT IN('properties.SHA256', "", "null"), 'properties.SHA256', null()))))
EVAL-file_modify_time = if('category'=="AdvancedHunting-DeviceFileEvents" AND IN('properties.ActionType', "FileModified", "FileRenamed"),'properties.Timestamp', null())

EVAL-file_name = if(IN('category', "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents") AND isnotnull('properties.FileName') AND NOT IN('properties.FileName', "", "null"), 'properties.FileName', null())
EVAL-file_path = if('category'=="AdvancedHunting-DeviceFileEvents" AND like('properties.FolderPath', "%" + 'properties.FileName'), 'properties.FolderPath', \
        if('category'=="AdvancedHunting-DeviceFileEvents" AND NOT like('properties.FolderPath', "%" + 'properties.FileName'), 'properties.FolderPath' + "\\" + 'properties.FileName', \
        if('category'=="AdvancedHunting-DeviceImageLoadEvents" AND isnotnull('properties.FolderPath') AND NOT IN('properties.FolderPath', "", "null"), 'properties.FolderPath', null())))
EVAL-file_size = if(IN('category', "AdvancedHunting-DeviceFileEvents", "AdvancedHunting-DeviceImageLoadEvents") AND isnotnull('properties.FileSize') AND NOT IN('properties.FileSize', "", "null"), 'properties.FileSize'/1000, null())

# Processes model
EVAL-original_file_name = if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.FileName') AND NOT IN('properties.FileName', "", "null"), 'properties.FileName', \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessFileName') AND NOT IN('properties.InitiatingProcessFileName', "", "null"), 'properties.InitiatingProcessFileName', null()))
