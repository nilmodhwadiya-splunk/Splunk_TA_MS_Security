EVAL-process_integrity_level = if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.ProcessIntegrityLevel') AND NOT IN(lower('properties.ProcessIntegrityLevel'), "", "none", "null"), lower('properties.ProcessIntegrityLevel'), \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessIntegrityLevel') AND NOT IN(lower('properties.InitiatingProcessIntegrityLevel'), "", "none", "null"), lower('properties.InitiatingProcessIntegrityLevel'), \
        if(IN('category', "AdvancedHunting-DeviceProcessEvents", "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents"), "untrusted", null())))
