EVAL-process_path = if('category'=="AdvancedHunting-DeviceProcessEvents" AND isnotnull('properties.FolderPath') AND NOT IN('properties.FolderPath', "", "null"), 'properties.FolderPath', \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents") AND isnotnull('properties.InitiatingProcessFolderPath') AND NOT IN('properties.InitiatingProcessFolderPath', "", "null"), 'properties.InitiatingProcessFolderPath', null()))

