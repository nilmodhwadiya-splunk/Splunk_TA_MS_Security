EVAL-process_exec = if('category'=="AdvancedHunting-DeviceProcessEvents"AND isnotnull('properties.FileName') AND NOT IN('properties.FileName', "", "null"), 'properties.FileName', \
        if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents", "AdvancedHunting-DeviceEvents")AND isnotnull('properties.InitiatingProcessFileName') AND NOT IN('properties.InitiatingProcessFileName', "", "null"), 'properties.InitiatingProcessFileName', null()))
EVAL-process_hash = if(IN('category', "AdvancedHunting-DeviceNetworkEvents", "AdvancedHunting-DeviceLogonEvents") AND isnotnull('properties.InitiatingProcessSHA256') AND NOT IN('properties.InitiatingProcessSHA256', "", "null"), 'properties.InitiatingProcessSHA256', \
